{% extends 'blog/base.html' %}
{% load static %}

{% block title %}Контакти - TechBlog{% endblock %}

{% block content %}
<div class="container my-5">
  <h1 class="text-center mb-5 fw-bold">Зв'яжіться з нами 📬</h1>

  <div class="row g-5">
    <div class="col-md-6">
      <div class="d-flex align-items-center mb-4 p-3 bg-light rounded shadow-sm">
        <div class="bi bi-envelope-fill text-primary me-4 fs-2"></div>
        <div>
          <h5 class="mb-0 fw-bold">Електронна пошта</h5>
          <p class="mb-0 text-muted">{{ email }}</p>
        </div>
      </div>

      <div class="d-flex align-items-center mb-4 p-3 bg-light rounded shadow-sm">
        <div class="bi bi-telephone-fill text-success me-4 fs-2"></div>
        <div>
          <h5 class="mb-0 fw-bold">Телефон</h5>
          <p class="mb-0 text-muted">{{ phone }}</p>
        </div>
      </div>

      <div class="d-flex align-items-center mb-4 p-3 bg-light rounded shadow-sm">
        <div class="bi bi-geo-alt-fill text-danger me-4 fs-2"></div>
        <div>
          <h5 class="mb-0 fw-bold">Адреса офісу</h5>
          <p class="mb-0 text-muted">{{ address }}</p>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card h-100 shadow border-0 overflow-hidden text-center justify-content-center bg-light" style="min-height: 250px;">
        <object data="{% static 'blog/images/map.png' %}" type="image/png" class="w-100 h-100 object-fit-cover">
          <div class="p-5">
            <div class="bi bi-map text-secondary mb-3" style="font-size: 3rem;"></div>
            <h4 class="fw-bold text-secondary">📍 Інтерактивна карта</h4>
            <p class="text-muted">Офіс розташований неподалік парку ім. Івана Франка у Львові.</p>
          </div>
        </object>
      </div>
    </div>
  </div>
</div>
{% endblock %}
