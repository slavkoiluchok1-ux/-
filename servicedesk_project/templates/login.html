{% extends "base.html" %} {% block content %}
<div class="form-card">
  <h2 style="text-align: center; margin-bottom: 20px">Вхід у систему</h2>

  {% if error %}
  <p
    style="
      color: #ef4444;
      text-align: center;
      margin-bottom: 15px;
      font-weight: 600;
    "
  >
    {{ error }}
  </p>
  {% endif %}

  <form action="/login" method="post">
    <div class="form-group">
      <label for="username">Логін</label>
      <input
        type="text"
        id="username"
        name="username"
        class="form-control"
        required
      />
    </div>
    <div class="form-group">
      <label for="password">Пароль</label>
      <input
        type="password"
        id="password"
        name="password"
        class="form-control"
        required
      />
    </div>
    <button type="submit" class="btn" style="width: 100%">Увійти</button>
  </form>
</div>
{% endblock %}
