{% extends "base.html" %} {% block content %}
<div class="form-card">
  <h2 style="text-align: center; margin-bottom: 20px">Заявка робітника</h2>

  {% if error %}
  <p
    style="
      color: #dc2626;
      text-align: center;
      margin-bottom: 15px;
      font-weight: 600;
    "
  >
    {{ error }}
  </p>
  {% endif %} {% if message %}
  <p
    style="
      color: #10b981;
      text-align: center;
      margin-bottom: 15px;
      font-weight: 600;
    "
  >
    {{ message }}
  </p>
  {% endif %}

  <form action="/apply_worker" method="post">
    <div class="form-group">
      <label for="name">Ваше ім'я</label>
      <input
        type="text"
        id="name"
        name="name"
        class="form-control"
        value="{{ user.display_name if user and user.display_name }}"
        placeholder="Наприклад: Іван Петренко"
        required
      />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        class="form-control"
        value="{{ user.email if user and user.email }}"
        placeholder="example@mail.com"
        required
      />
    </div>

    <div class="form-group">
      <label for="phone">Телефон</label>
      <input
        type="tel"
        id="phone"
        name="phone"
        class="form-control"
        value="{{ user.phone if user and user.phone }}"
        placeholder="+380 99 123 45 67"
        required
      />
    </div>

    <div class="form-group">
      <label for="contact_other">Інший спосіб зв’язку</label>
      <input
        type="text"
        id="contact_other"
        name="contact_other"
        class="form-control"
        placeholder="Telegram, Viber, WhatsApp або інший контакт"
      />
    </div>

    <div class="form-group">
      <label for="message">Розкажіть про себе</label>
      <textarea
        id="message"
        name="message"
        class="form-control"
        rows="4"
        placeholder="Чому ви хочете приєднатися як майстер?"
      ></textarea>
    </div>

    <button type="submit" class="btn" style="width: 100%">
      Надіслати заявку
    </button>
  </form>
</div>
{% endblock %}
