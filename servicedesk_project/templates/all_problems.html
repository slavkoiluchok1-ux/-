{% extends 'base.html' %} {% block content %}
<div class="container" style="margin-top: 30px">
  <h2>Нові заявки</h2>
  {% if not problems %}
  <p style="color: #64748b">Немає заявки на перевірку.</p>
  {% else %}
  <div class="grid">
    {% for p in problems %}
    <div class="ticket-card waiting">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: start;
          margin-bottom: 12px;
        "
      >
        <div>
          <h3>{{ p.title }}</h3>
          <p style="color: #64748b; margin: 4px 0">Статус: {{ p.status }}</p>
        </div>
        <span class="badge badge-waiting">#{{ p.id }}</span>
      </div>
      <p style="color: #475569; white-space: pre-wrap">{{ p.description }}</p>
      <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px">
        <a
          href="/problem?problem_id={{ p.id }}"
          class="btn"
          style="min-width: 140px"
          >Деталі</a
        >
      </div>
    </div>
    {% endfor %}
  </div>
  {% endif %}
</div>
{% endblock %}
